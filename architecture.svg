  <!-- ═══════════════════════════════════════════════════
       TEE CARD BRIDGE FLOW LEGEND (bottom left)
  ════════════════════════════════════════════════════ -->
  <rect x="28" y="595" width="360" height="148" rx="8" fill="#fff1f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="208" y="616" text-anchor="middle" font-size="11" font-weight="bold" fill="#7f1d1d">TEE Card Bridge — Step by Step</text>
  <line x1="36" y1="621" x2="380" y2="621" stroke="#fca5a5" stroke-width="1"/>
  <text x="42" y="637" font-size="10" fill="#374151">① Agent calls <tspan font-weight="bold">request_card(amount, chain)</tspan></text>
  <text x="42" y="653" font-size="10" fill="#374151">② TEE returns HTTP 402 with payment requirements</text>
  <text x="42" y="669" font-size="10" fill="#374151">③ x402-pay signs + settles EURC on Arc on-chain</text>
  <text x="42" y="685" font-size="10" fill="#374151">④ TEE verifies tx, issues one-time Stripe virtual card</text>
  <text x="42" y="701" font-size="10" fill="#374151">⑤ Card ECIES-encrypted → only agent pubkey can decrypt</text>
  <text x="42" y="717" font-size="10" fill="#374151">⑥ Playwright browser fills card at merchant checkout</text>
  <text x="42" y="733" font-size="10" fill="#7f1d1d" font-style="italic">Operator never sees card numbers. Code hash verifiable.</text>

